name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: invoicer
          POSTGRES_PASSWORD: invoicerpw
          POSTGRES_DB: invoicing
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U invoicer" --health-interval=5s --health-timeout=5s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck postgresql-client
      - name: Shell lint
        run: |
          shellcheck scripts/*.sh
      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U invoicer; do echo waiting; sleep 2; done
      - name: Apply schema
        env:
          PGPASSWORD: invoicerpw
        run: |
          psql -h localhost -p 5432 -U invoicer -d invoicing -f db/schema.sql